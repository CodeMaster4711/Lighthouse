services:
  app:
    build:
      context: ./lighthouse
      dockerfile: Dockerfile.dev
    container_name: lighthouse-app
    ports:
      - "5173:5173"
    volumes:
      - ./lighthouse:/app
      - /app/node_modules
      - ./database:/database
      - ./data:/app/data
    environment:
      - DATABASE_PATH=/app/data/lighthouse.db
      - SESSION_SECRET=dev-secret-change-in-production
      - NODE_ENV=development
    networks:
      - lighthouse-network
    stdin_open: true
    tty: true
    restart: unless-stopped

networks:
  lighthouse-network:
    driver: bridge
